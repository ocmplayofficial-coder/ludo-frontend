<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#8B0000" />

    <title>TRY PLAYERS - Ludo Pro Arena</title>
    <meta name="description" content="India's #1 Skill-based Ludo game. Play with real players and win real cash." />
    <meta name="keywords" content="ludo pro, try players, earn money ludo, real cash game" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Try Players" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
      :root { --brand: #8B0000; --gold: #FFD700; }
      
      * {
        margin: 0; padding: 0; box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        user-select: none; /* Text selection disable in game */
      }

      body, html {
        width: 100%; height: 100%;
        background-color: var(--brand);
        font-family: 'Poppins', sans-serif;
        overflow: hidden; /* Prevent body scroll, handle scroll in components */
      }

      /* 🎲 PREMIUM GAMING LOADER */
      #app-loader {
        position: fixed; inset: 0;
        background: radial-gradient(circle at top, #8B0000 0%, #1a0000 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 99999;
      }

      .dice-loader {
        font-size: 60px;
        animation: roll 1.2s infinite ease-in-out;
        margin-bottom: 20px;
        filter: drop-shadow(0 0 15px var(--gold));
      }

      .loading-text {
        color: var(--gold);
        font-weight: 900;
        letter-spacing: 3px;
        font-size: 18px;
        animation: fade 1s infinite alternate;
      }

      @keyframes roll {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.2); }
        100% { transform: rotate(360deg) scale(1); }
      }

      @keyframes fade { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
  </head>

  <body>
    <div id="app-loader">
      <div class="dice-loader">🎲</div>
      <div class="loading-text">TRY PLAYERS</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Automatically hide loader when everything is ready
      window.addEventListener("load", () => {
        const loader = document.getElementById("app-loader");
        if (loader) {
          loader.style.transition = "opacity 0.5s ease-out";
          loader.style.opacity = "0";
          setTimeout(() => loader.style.display = "none", 500);
        }
      });
    </script>
  </body>
</html>
